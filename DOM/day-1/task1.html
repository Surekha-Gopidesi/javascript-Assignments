<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
    let ul=document.createElement("ul");
    for(let i=0;i<5;i++){
        let li=document.createElement("li");
        ul.appendChild(li);
        li.innerText=i;
    }
    console.log(document.body.appendChild(ul));
    

    </script>
</body>
</html>
