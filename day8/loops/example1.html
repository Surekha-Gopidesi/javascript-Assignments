<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<script>
//For loop
console.log("Using for loop")
for (let i = 1; i <= 5; i++) {
  console.log( i);
}
//While loop
console.log("Using while loop");
let j = 1;
while (j <= 5) {
  console.log( j);
  j++;
}
let k = 1;

//Do While loop
console.log("Using Do while loop");
do {
  console.log( k);
  k++;

} while (k <= 5);

</script>

</body>
</html>
